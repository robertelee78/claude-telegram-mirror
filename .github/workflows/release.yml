name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-crates

      - name: Build release binary
        working-directory: rust-crates
        run: |
          cargo build --release --bin ctm
          strip target/release/ctm
          ls -lh target/release/ctm

      - name: Package binary
        run: |
          cp rust-crates/target/release/ctm npm-packages/ctm-linux-x64/bin/ctm
          chmod 755 npm-packages/ctm-linux-x64/bin/ctm
          node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const bin = fs.readFileSync('npm-packages/ctm-linux-x64/bin/ctm');
            const checksums = { ctm: { sha256: crypto.createHash('sha256').update(bin).digest('hex'), size: bin.length } };
            fs.writeFileSync('npm-packages/ctm-linux-x64/bin/checksums.json', JSON.stringify(checksums, null, 2) + '\n');
          "
          cd npm-packages/ctm-linux-x64
          npm pack
          mv *.tgz ../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctm-linux-x64
          path: '*.tgz'

  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-crates

      - name: Build release binary
        working-directory: rust-crates
        run: |
          cargo build --release --bin ctm
          strip target/release/ctm
          ls -lh target/release/ctm

      # Sign + notarize AFTER strip (strip rewrites the Mach-O and invalidates any
      # signature) and BEFORE the checksum/pack step (so checksums.json covers the
      # signed bytes). Without a trusted Developer ID signature, modern macOS
      # SIGKILLs the launchd-spawned daemon for a code-signing / launch-constraint
      # violation. Gated on secrets so forks/PRs still build (ad-hoc fallback).
      - name: Sign and notarize (Developer ID)
        working-directory: rust-crates
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          set -euo pipefail
          BIN=target/release/ctm
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ] || [ -z "${APPLE_CERT_P12_BASE64:-}" ]; then
            echo "::warning::Apple signing secrets not set — shipping an ad-hoc-signed binary that macOS Gatekeeper may reject. Configure APPLE_* secrets to notarize."
            codesign --force --sign - --timestamp=none "$BIN" || true
            codesign -dvvv "$BIN" 2>&1 || true
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/ctm-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -hex 20)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          # Hardened runtime + secure timestamp are required for notarization.
          codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"
          # A bare CLI Mach-O is notarized via a zip (it cannot be stapled; Gatekeeper
          # validates the registered cdhash online).
          ditto -c -k --keepParent "$BIN" "$RUNNER_TEMP/ctm.zip"
          xcrun notarytool submit "$RUNNER_TEMP/ctm.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" --wait
          codesign -dvvv "$BIN" 2>&1 | grep -E 'Authority|TeamIdentifier' || true
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Package binary
        run: |
          cp rust-crates/target/release/ctm npm-packages/ctm-darwin-arm64/bin/ctm
          chmod 755 npm-packages/ctm-darwin-arm64/bin/ctm
          node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const bin = fs.readFileSync('npm-packages/ctm-darwin-arm64/bin/ctm');
            const checksums = { ctm: { sha256: crypto.createHash('sha256').update(bin).digest('hex'), size: bin.length } };
            fs.writeFileSync('npm-packages/ctm-darwin-arm64/bin/checksums.json', JSON.stringify(checksums, null, 2) + '\n');
          "
          cd npm-packages/ctm-darwin-arm64
          npm pack
          mv *.tgz ../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctm-darwin-arm64
          path: '*.tgz'

  build-darwin-x64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-crates

      - name: Build release binary
        working-directory: rust-crates
        run: |
          cargo build --release --target x86_64-apple-darwin --bin ctm
          strip target/x86_64-apple-darwin/release/ctm
          ls -lh target/x86_64-apple-darwin/release/ctm

      # See darwin-arm64 job for rationale. Note: `strip` on the x64 cross-built
      # binary removes its signature entirely, so signing here is mandatory for the
      # Intel package to be runnable at all.
      - name: Sign and notarize (Developer ID)
        working-directory: rust-crates
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          set -euo pipefail
          BIN=target/x86_64-apple-darwin/release/ctm
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ] || [ -z "${APPLE_CERT_P12_BASE64:-}" ]; then
            echo "::warning::Apple signing secrets not set — shipping an ad-hoc-signed binary that macOS Gatekeeper may reject. Configure APPLE_* secrets to notarize."
            codesign --force --sign - --timestamp=none "$BIN" || true
            codesign -dvvv "$BIN" 2>&1 || true
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/ctm-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -hex 20)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"
          ditto -c -k --keepParent "$BIN" "$RUNNER_TEMP/ctm.zip"
          xcrun notarytool submit "$RUNNER_TEMP/ctm.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" --wait
          codesign -dvvv "$BIN" 2>&1 | grep -E 'Authority|TeamIdentifier' || true
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Package binary
        run: |
          cp rust-crates/target/x86_64-apple-darwin/release/ctm npm-packages/ctm-darwin-x64/bin/ctm
          chmod 755 npm-packages/ctm-darwin-x64/bin/ctm
          node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const bin = fs.readFileSync('npm-packages/ctm-darwin-x64/bin/ctm');
            const checksums = { ctm: { sha256: crypto.createHash('sha256').update(bin).digest('hex'), size: bin.length } };
            fs.writeFileSync('npm-packages/ctm-darwin-x64/bin/checksums.json', JSON.stringify(checksums, null, 2) + '\n');
          "
          cd npm-packages/ctm-darwin-x64
          npm pack
          mv *.tgz ../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctm-darwin-x64
          path: '*.tgz'

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-crates

      - name: Install cross-linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        working-directory: rust-crates
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu --bin ctm
          aarch64-linux-gnu-strip target/aarch64-unknown-linux-gnu/release/ctm
          ls -lh target/aarch64-unknown-linux-gnu/release/ctm

      - name: Package binary
        run: |
          cp rust-crates/target/aarch64-unknown-linux-gnu/release/ctm npm-packages/ctm-linux-arm64/bin/ctm
          chmod 755 npm-packages/ctm-linux-arm64/bin/ctm
          node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const bin = fs.readFileSync('npm-packages/ctm-linux-arm64/bin/ctm');
            const checksums = { ctm: { sha256: crypto.createHash('sha256').update(bin).digest('hex'), size: bin.length } };
            fs.writeFileSync('npm-packages/ctm-linux-arm64/bin/checksums.json', JSON.stringify(checksums, null, 2) + '\n');
          "
          cd npm-packages/ctm-linux-arm64
          npm pack
          mv *.tgz ../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctm-linux-arm64
          path: '*.tgz'

  publish:
    needs: [build-linux-x64, build-linux-arm64, build-darwin-arm64, build-darwin-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish platform packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # pipefail so `npm publish ... | tee` reports npm's exit status, not tee's.
          # Without it, a failed publish (e.g. EOTP/auth) is masked as success and only
          # surfaces ~150s later as a misleading "packages not available on registry"
          # timeout; this also makes the EPUBLISHCONFLICT skip-branch actually reachable.
          set -o pipefail
          # Publish platform packages first
          for pkg in ctm-linux-x64 ctm-linux-arm64 ctm-darwin-arm64 ctm-darwin-x64; do
            # -print -quit (not `| head -1`): emits the first match and stops with no
            # pipe, so it can't SIGPIPE-fail (exit 141) under the set -o pipefail above.
            tgz=$(find artifacts/$pkg -name "*.tgz" -print -quit)
            if [ -n "$tgz" ]; then
              echo "Publishing $pkg..."
              if ! npm publish "$tgz" --access public --provenance 2>&1 | tee /tmp/npm-publish-$pkg.log; then
                if grep -q 'EPUBLISHCONFLICT\|You cannot publish over the previously published versions' /tmp/npm-publish-$pkg.log; then
                  echo "  $pkg already published at this version — skipping"
                else
                  echo "  ERROR: $pkg publish failed with unexpected error"
                  cat /tmp/npm-publish-$pkg.log
                  exit 1
                fi
              fi
            fi
          done

          # Wait for npm registry propagation
          VERSION=$(node -p "require('./package.json').version")
          echo "Waiting for npm registry propagation (v${VERSION})..."
          for i in $(seq 1 30); do
            ALL_AVAILABLE=true
            for pkg in ctm-linux-x64 ctm-linux-arm64 ctm-darwin-arm64 ctm-darwin-x64; do
              if ! npm view @agidreams/${pkg}@${VERSION} version 2>/dev/null; then
                ALL_AVAILABLE=false
                break
              fi
            done
            if [ "$ALL_AVAILABLE" = true ]; then
              echo "All platform packages available on registry"
              break
            fi
            echo "Attempt $i/30 — waiting 5s..."
            sleep 5
          done

          # After the loop, verify all packages are available
          if [ "$ALL_AVAILABLE" != "true" ]; then
            echo "ERROR: Platform packages not available on npm registry after 150s timeout"
            echo "Cannot publish main package without platform dependencies"
            exit 1
          fi

          # Publish the main package
          npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/**/*.tgz
          generate_release_notes: true

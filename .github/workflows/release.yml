name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-crates

      - name: Build release binary
        working-directory: rust-crates
        run: |
          cargo build --release --bin ctm
          strip target/release/ctm
          ls -lh target/release/ctm

      - name: Package binary
        run: |
          cp rust-crates/target/release/ctm npm-packages/ctm-linux-x64/bin/ctm
          chmod 755 npm-packages/ctm-linux-x64/bin/ctm
          cd npm-packages/ctm-linux-x64
          npm pack
          mv *.tgz ../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctm-linux-x64
          path: '*.tgz'

  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-crates

      - name: Build release binary
        working-directory: rust-crates
        run: |
          cargo build --release --bin ctm
          strip target/release/ctm
          ls -lh target/release/ctm

      - name: Package binary
        run: |
          cp rust-crates/target/release/ctm npm-packages/ctm-darwin-arm64/bin/ctm
          chmod 755 npm-packages/ctm-darwin-arm64/bin/ctm
          cd npm-packages/ctm-darwin-arm64
          npm pack
          mv *.tgz ../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctm-darwin-arm64
          path: '*.tgz'

  build-darwin-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-crates

      - name: Build release binary
        working-directory: rust-crates
        run: |
          cargo build --release --bin ctm
          strip target/release/ctm
          ls -lh target/release/ctm

      - name: Package binary
        run: |
          cp rust-crates/target/release/ctm npm-packages/ctm-darwin-x64/bin/ctm
          chmod 755 npm-packages/ctm-darwin-x64/bin/ctm
          cd npm-packages/ctm-darwin-x64
          npm pack
          mv *.tgz ../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctm-darwin-x64
          path: '*.tgz'

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-crates

      - name: Install cross-linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        working-directory: rust-crates
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu --bin ctm
          aarch64-linux-gnu-strip target/aarch64-unknown-linux-gnu/release/ctm
          ls -lh target/aarch64-unknown-linux-gnu/release/ctm

      - name: Package binary
        run: |
          cp rust-crates/target/aarch64-unknown-linux-gnu/release/ctm npm-packages/ctm-linux-arm64/bin/ctm
          chmod 755 npm-packages/ctm-linux-arm64/bin/ctm
          cd npm-packages/ctm-linux-arm64
          npm pack
          mv *.tgz ../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctm-linux-arm64
          path: '*.tgz'

  publish:
    needs: [build-linux-x64, build-linux-arm64, build-darwin-arm64, build-darwin-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish platform packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc

          # Publish platform packages first
          for pkg in ctm-linux-x64 ctm-linux-arm64 ctm-darwin-arm64 ctm-darwin-x64; do
            tgz=$(find artifacts/$pkg -name "*.tgz" | head -1)
            if [ -n "$tgz" ]; then
              echo "Publishing $pkg..."
              npm publish "$tgz" --access public || true
            fi
          done

          # Wait for npm registry propagation
          VERSION=$(node -p "require('./package.json').version")
          echo "Waiting for npm registry propagation (v${VERSION})..."
          for i in $(seq 1 30); do
            if npm view @agidreams/ctm-linux-x64@${VERSION} version 2>/dev/null; then
              echo "Package available on registry"
              break
            fi
            echo "Attempt $i/30 — waiting 5s..."
            sleep 5
          done

          # Publish the main package
          npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/**/*.tgz
          generate_release_notes: true
